# permissions for end users to view mutexes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: clusterrole
    app.kubernetes.io/instance: mutex-viewer-role
    app.kubernetes.io/component: rbac
    app.kubernetes.io/created-by: openshift-node-upgrade-mutex-operator
    app.kubernetes.io/part-of: openshift-node-upgrade-mutex-operator
    app.kubernetes.io/managed-by: kustomize
  name: mutex-viewer-role
rules:
- apiGroups:
