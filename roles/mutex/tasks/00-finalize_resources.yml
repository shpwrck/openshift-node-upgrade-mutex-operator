---
# Drain and Delete Canary Machine Config Pool
- name: Finalizer Block
  block:
    # Get Canary Pool
    - name: Gather Control Plane Machine Config Pools
      kubernetes.core.k8s_info:
        api_version: "machineconfiguration.openshift.io/v1"
        kind: MachineConfigPool
        name: canary
      register: canary_mcp

    # Disconnect Machine Config
    - name: Disconnect Machine Config
      kubernetes.core.k8s_json_patch:
        kind: MachineConfig
        api_version: "v1"
        name: "{{ canary_mcp | community.general.json_query('resources[].spec.configuration.name | [0]') }}"
        patch:
          - op: remove
            path: "/metadata/annotations"
          - op: remove
            path: "/metadata/ownerReferences"

    # Attempt to Delete Canary Pool
    - name: Delete Canary Machine Config Pool
      kubernetes.core.k8s:
        state: absent
        template: canarymachineconfigpool.yml
      vars:
        resource_name: "{{ _openshift-optional_skrzypek_io_mutex.metadata.name }}"
        resource_namespace: "{{ _openshift-optional_skrzypek_io_mutex.metadata.namespace }}"
        resource_kind: "{{ _openshift-optional_skrzypek_io_mutex.kind }}"
        resource_group: "{{ _openshift-optional_skrzypek_io_mutex.apiVersion | split('/') | first }}"

  rescue:
    # Upon Failure, Update Status
    - name: Report Finalizer Failure
      operator_sdk.util.k8s_status:
        api_version: "openshift-optional.skrzypek.io/v1alpha1"
        kind: Mutex
        name: "{{ ansible_operator_meta.name }}"
        namespace: "{{ ansible_operator_meta.namespace }}"
        conditions:
          - type: Canary
            status: "False"
            reason: FailedDelete
            message: Finalizer failed to delete canary machine config pool
            lastTransitionTime: "{{ lookup('pipe', 'date --rfc-3339 seconds') }}"
